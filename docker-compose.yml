version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: antimartingale-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: antimartingale
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - antimartingale-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antimartingale-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: antimartingale
      DB_SSLMODE: disable
      SERVER_PORT: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - antimartingale-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  antimartingale-network:
    driver: bridge
